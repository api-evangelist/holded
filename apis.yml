created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: holded:rest-api
    name: Holded REST API
    description: >-
      REST API for managing invoicing, contacts, products, accounting,
      projects, employees, and CRM records inside the Holded business
      management platform. Authentication uses an API key passed via
      the `key` header on every request.
    humanURL: https://developers.holded.com
    baseURL: https://api.holded.com/api
    tags:
