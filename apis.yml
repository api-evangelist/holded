aid: holded
name: Holded
description: >-
  Holded is a cloud-based all-in-one business management platform from Spain
  (now part of Visma) that combines ERP, CRM, accounting, invoicing,
  inventory, project management, HR, and team collaboration features for
  small and medium-sized businesses. The Holded REST API provides
  programmatic access to invoicing, contacts, products, accounting,
  projects, employees, and CRM data using a simple API key authentication
  scheme over JSON.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - ERP
  - CRM
  - Accounting
  - Invoicing
  - Business Management
  - SMB
  - Spain
